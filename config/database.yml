default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV['POSTGRES_USERNAME'] %>
  password: <%= ENV['POSTGRES_PASSWORD'] %>
  host: localhost
  port: 5432


development:
  <<: *default
  database: rootless_development


test:
  <<: *default
  database: rootless_test


production:
  primary: &primary_production
    <<: *default
    database: rootless_production
    username: rootless
    password: <%= ENV["ROOTLESS_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: rootless_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: rootless_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: rootless_production_cable
    migrations_paths: db/cable_migrate
